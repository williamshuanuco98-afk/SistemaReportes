<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes Universitarios | Sistema de Incidencias</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons Phosphor -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-dark text-light position-relative" style="overflow-x: hidden;">
    <!-- Capa de textura y degradados (gestionado en style.css) -->
    <div id="noise-overlay"></div>

    <!-- Navbar Bootstrap -->
    <nav class="navbar navbar-expand-lg fixed-top glass-navbar py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2 fw-bold text-light" href="#"
                onclick="app.navigate('dashboard')" role="button">
                <i class="ph ph-shield-check text-primary fs-2 m-0 p-0"></i>
                <span style="font-size: 1.25rem;">UniSafe</span>
            </a>

            <div class="d-flex align-items-center gap-3 ms-auto">
                <div
                    class="nav-links bg-black bg-opacity-25 rounded-pill p-1 border border-secondary border-opacity-25 d-none d-md-flex">
                    <button class="btn btn-sm nav-btn active rounded-pill px-3 fw-medium text-light shadow-none"
                        data-target="dashboard" onclick="app.navigate('dashboard')">Panel</button>
                    <button class="btn btn-sm nav-btn rounded-pill px-3 fw-medium text-secondary shadow-none"
                        data-target="report" onclick="app.navigate('report')">Nueva Incidencia</button>
                </div>
                <!-- Avatar -->
                <div class="nav-profile">
                    <img src="https://ui-avatars.com/api/?name=User&background=6f42c1&color=fff" alt="User Avatar"
                        class="rounded-circle border border-2 border-transparent" width="40" height="40"
                        style="transition: border-color 0.3s ease;">
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenedor Principal SPA -->
    <main id="app-content" class="container" style="padding-top: 110px; padding-bottom: 4rem;"></main>

    <!-- ==== Plantillas DOM ==== -->
    <template id="tmpl-dashboard">
        <div class="dashboard view-fade-in">
            <!-- Hero -->
            <div class="glass-card rounded-4 p-4 p-md-5 mb-5 position-relative overflow-hidden hero-section">
                <!-- Efecto visual blob -->
                <div class="glow-blob"></div>
                <div class="row align-items-center position-relative z-1 g-4">
                    <div class="col-lg-7 text-center text-lg-start">
                        <h1 class="fw-bold display-5 mb-3" style="letter-spacing: -0.03em;">Mantenimiento del campus en
                            <span class="text-gradient">tiempo real</span></h1>
                        <p class="text-secondary fs-5 mb-4 max-w-lg">Aplicación para reportar averías y problemas en tus
                            zonas universitarias. Participa para lograr un entorno más seguro y moderno.</p>
                        <button
                            class="btn btn-primary btn-lg rounded-3 gap-2 d-inline-flex align-items-center custom-btn-primary"
                            onclick="app.navigate('report')">
                            <i class="ph ph-plus-circle fs-4 mb-1"></i>
                            Reportar Problema
                        </button>
                    </div>
                    <div class="col-lg-5 d-flex gap-3 justify-content-center justify-content-lg-end mt-4 mt-lg-0">
                        <div class="card glass-metric border-0 rounded-4 p-4 flex-fill text-center bg-black bg-opacity-25"
                            style="box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                            <i class="ph ph-warning-circle text-warning display-4 mb-2"></i>
                            <h6 class="text-secondary mb-1 fw-medium">Activas</h6>
                            <h2 class="fw-bold mb-0">12</h2>
                        </div>
                        <div class="card glass-metric border-0 rounded-4 p-4 flex-fill text-center bg-black bg-opacity-25"
                            style="box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                            <i class="ph ph-check-circle text-success display-4 mb-2"></i>
                            <h6 class="text-secondary mb-1 fw-medium">Resueltas</h6>
                            <h2 class="fw-bold mb-0">128</h2>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Listado -->
            <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center mb-4 gap-3">
                <h2 class="h4 fw-bold m-0 text-light">Incidencias Recientes</h2>
                <div class="btn-group" role="group">
                    <button type="button" class="btn btn-light btn-sm rounded-start-pill px-3 fw-medium">Todas</button>
                    <button type="button"
                        class="btn btn-outline-secondary text-light btn-sm rounded-end-pill px-3 fw-medium border-start-0">Mis
                        reportes</button>
                </div>
            </div>

            <div class="row g-4" id="incidents-grid">
                <!-- Cards injectadas mediante app.js -->
            </div>
        </div>
    </template>

    <template id="tmpl-report">
        <div class="report-view view-fade-in">
            <div class="text-center mb-5">
                <button
                    class="btn btn-link text-secondary text-decoration-none fw-medium d-inline-flex align-items-center gap-2 mb-3 btn-back-hover p-0"
                    onclick="app.navigate('dashboard')">
                    <i class="ph ph-arrow-left"></i> Volver al panel central
                </button>
                <h2 class="fw-bold display-6 mb-2 text-light" style="letter-spacing: -0.02em;">Nueva Incidencia</h2>
                <p class="text-secondary mb-0">Por favor completa los detalles. Usaremos tu información para canalizar
                    el soporte.</p>
            </div>

            <div class="row justify-content-center">
                <div class="col-md-10 col-lg-8">
                    <form id="incident-form" class="glass-card p-4 p-md-5 rounded-4 shadow-lg mb-4"
                        onsubmit="app.submitReport(event)">
                        <div class="row g-4 mb-4">
                            <div class="col-sm-6">
                                <label class="form-label fw-medium text-light mb-1">Categoría del problema</label>
                                <div class="position-relative">
                                    <i
                                        class="ph ph-list-dashes position-absolute top-50 translate-middle-y text-secondary ms-3 fs-5"></i>
                                    <select class="form-select custom-input text-secondary" id="category" required
                                        onchange="this.classList.remove('text-secondary'); this.classList.add('text-light');">
                                        <option value="" disabled selected>Selecciona categoría</option>
                                        <option value="infra">Infraestructura y Mobiliario</option>
                                        <option value="tech">Tecnología, WiFi y Equipos</option>
                                        <option value="security">Seguridad del Campus</option>
                                        <option value="clean">Higiene y Limpieza</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label fw-medium text-light mb-1">Nivel de Urgencia</label>
                                <div class="position-relative">
                                    <i
                                        class="ph ph-warning-circle position-absolute top-50 translate-middle-y text-secondary ms-3 fs-5"></i>
                                    <select class="form-select custom-input text-secondary" id="urgency" required
                                        onchange="this.classList.remove('text-secondary'); this.classList.add('text-light');">
                                        <option value="" disabled selected>Nivel de gravedad</option>
                                        <option value="baja" class="text-success">Baja (Mantenimiento)</option>
                                        <option value="media" class="text-warning">Media (Interrumpe clases)</option>
                                        <option value="alta" class="text-danger">Alta (Riesgos a salud)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-medium text-light mb-1">Ubicación exacta</label>
                                <div class="position-relative">
                                    <i
                                        class="ph ph-map-pin position-absolute top-50 translate-middle-y text-secondary ms-3 fs-5"></i>
                                    <input type="text" class="form-control custom-input text-light" id="location"
                                        placeholder="Pabellón C, Aula 302" required>
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-medium text-light mb-1">Descripción detallada</label>
                                <div class="position-relative">
                                    <i
                                        class="ph ph-text-align-left position-absolute pt-3 mt-1 text-secondary ms-3 fs-5"></i>
                                    <textarea class="form-control custom-input pb-2 pt-3 text-light" id="description"
                                        rows="4" placeholder="Describe lo que has observado de forma clara..."
                                        required></textarea>
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-medium text-light mb-1">Adjuntar Evidencia
                                    (Opcional)</label>
                                <div class="upload-area text-center p-4 rounded-3 border border-secondary border-opacity-25"
                                    style="border-style: dashed !important; cursor: pointer; transition: all 0.3s ease;">
                                    <i class="ph ph-cloud-arrow-up display-4 text-secondary mb-2 d-block"></i>
                                    <span class="text-secondary m-0">Arrastra un archivo aquí o <span
                                            class="text-primary text-decoration-underline">explorar localmente</span>
                                        (Máx 5MB)</span>
                                </div>
                            </div>
                        </div>

                        <div class="text-center mt-3">
                            <button type="submit"
                                class="btn btn-primary btn-lg rounded-3 px-5 custom-btn-primary d-inline-flex gap-2 align-items-center w-100 justify-content-center">
                                <i class="ph ph-paper-plane-tilt fs-5"></i> Registrar en Sistema
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </template>

    <template id="tmpl-success">
        <div class="success-view view-fade-in text-center py-5 my-5">
            <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-success bg-opacity-10 mb-4"
                style="width: 130px; height: 130px; box-shadow: 0 0 30px rgba(25, 135, 84, 0.15);">
                <i class="ph ph-check-circle text-success" style="font-size: 5rem;"></i>
            </div>
            <h2 class="fw-bold display-5 mb-3 text-light">¡Reporte Enviado!</h2>
            <p class="text-secondary lead mx-auto" style="max-width: 500px;">Gracias por tu valioso aporte. El folio de
                rastreo de tu caso es <strong class="text-light">#<span id="folio-display"></span></strong>.</p>
            <button class="btn btn-outline-light btn-lg mt-4 px-4 py-2 rounded-pill custom-btn-outline"
                onclick="app.navigate('dashboard')">
                Volver al Panel
            </button>
        </div>
    </template>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./app.js"></script>
</body>

</html>
